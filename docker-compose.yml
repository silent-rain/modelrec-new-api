# New-API Docker Compose Configuration (Full Containerized)
#
# 全容器化方案：所有服务均运行在容器中
# 包含：new-api + PostgreSQL + Redis + Nginx + pgAdmin
#
# Quick Start:
#   1. 修改密码：在下方 environment 中替换所有默认密码
#   2. （可选）放置 SSL 证书到 ./ssl/ 目录，并修改 nginx.conf
#   3. docker-compose up -d
#   4. 访问 http://localhost （或 https://your-domain.com）
#   5. pgAdmin 访问 http://localhost:5050 （可选）
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  # ============ Nginx 反向代理 ============
  nginx:
    image: nginx:alpine
    container_name: new-api-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web/default/dist:/usr/share/nginx/html/default:ro
      - ./web/classic/dist:/usr/share/nginx/html/classic:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      new-api:
        condition: service_healthy
    networks:
      - new-api-network

  # ============ New-API 主服务 ============
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://newapi:pass@postgres:5432/new-api # ⚠️ IMPORTANT: Change the password in production!
      # - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://redis:6379 # ⚠️ IMPORTANT: Change the password in production!
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=new-api-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - RELAY_IDLE_CONN_TIMEOUT=90  # Relay HTTP 客户端空闲连接超时时间，单位秒，默认跟随 Go 标准库，设置为0表示不限制 (Relay HTTP client idle keep-alive timeout in seconds, defaults to Go standard library; set 0 to disable)
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ============ Redis 缓存 ============
  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # ⚠️ IMPORTANT: Change this password in production!
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - new-api-network
 
  # ============ PostgreSQL 数据库 ============
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: KLkxwftyYy4r  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    expose:
      - "5432"
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker



  # ============ MySQL 数据库 ============
#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker


  # ============ pgAdmin 数据库管理界面（可选） ============
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: new-api-pgadmin
  #   restart: always
  #   ports:
  #     - "127.0.0.1:5050:80"   # 只绑定到 localhost，外网无法直接访问
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: CHANGE_THIS_PGADMIN_PASSWORD
  #     PGADMIN_CONFIG_SERVER_MODE: "True"
  #     PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
  #   volumes:
  #     - pgadmin-data:/var/lib/pgadmin
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - new-api-network
  #   # 不需要时注释掉整个 pgadmin 服务即可

volumes:
  pg_data:
    driver: local
  #  mysql_data:
  #    driver: local
  redis_data:
    driver: local
  pgadmin-data:
    driver: local
  nginx-cache:

networks:
  new-api-network:
    driver: bridge
